# .github/workflows/test.yml
name: Test
on:
  push:
    branches: [main]
  pull_request:

# lib/env.js throws if any of these are absent, and it is imported by both
# data-source.js and auth.config.js -- so `next build`, vitest and the TypeORM
# CLI all refuse to start without them. Setting them once at job level avoids
# the trap of remembering them per step.
env:
  DATABASE_URL: postgresql://sp:sp@localhost:5432/scholarpress_test
  AUTH_SECRET: ci-test-secret-not-used-in-production
  AUTH_GITHUB_ID: ci-placeholder
  AUTH_GITHUB_SECRET: ci-placeholder
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: scholarpress_test
          POSTGRES_USER: sp
          POSTGRES_PASSWORD: sp
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run migrations
        run: npx typeorm migration:run -d data-source.js

      - name: Unit and integration tests
        run: npx vitest run --coverage

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        # E2E=1 switches on the Credentials provider the fixture signs in with
        # (Ch 4 §4.9). playwright.config.js builds and starts the app itself,
        # and the webServer inherits this env.
        #
        # AUTH_TRUST_HOST=true is what makes that work. playwright.config.js runs
        # `next build && next start`, so the app runs as NODE_ENV=production --
        # and Auth.js v5 refuses to serve /api/auth/* for a host it cannot verify:
        #     [auth][error] UntrustedHost: Host must be trusted.
        #     URL was: http://localhost:3000/api/auth/session
        # The credentials callback then never completes, the redirect to
        # /dashboard never happens, and the fixture times out on waitForURL.
        # Setting it here (and nowhere else) keeps the trust confined to CI: a
        # real deployment behind a proxy should set AUTH_URL instead.
        env:
          E2E: '1'
          AUTH_TRUST_HOST: 'true'
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
